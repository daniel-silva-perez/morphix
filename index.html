<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORPHIX — Live GLSL Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060606;
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace;
    color: #c0c0c0;
    font-size: 13px;
  }
  #sidebar {
    width: 380px;
    display: flex;
    flex-direction: column;
    border-right: 1px solid #1a1a1a;
    background: #080808;
    flex-shrink: 0;
    overflow: hidden;
  }
  #toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #1a1a1a;
    background: #0a0a0a;
  }
  #toolbar h1 {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #00ff87;
    font-weight: 400;
  }
  .toolbar-btns { display: flex; gap: 8px; }
  .tbtn {
    background: transparent;
    border: 1px solid #1e1e1e;
    color: #555;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: inherit;
    transition: all 0.2s;
  }
  .tbtn:hover { border-color: #00ff87; color: #00ff87; }
  .tbtn.run { border-color: #00ff87; color: #00ff87; }
  #frag-editor {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    line-height: 1.6;
    white-space: pre;
    outline: none;
    tab-size: 2;
    caret-color: #00ff87;
    background: #080808;
    min-height: 0;
  }
  #frag-editor:focus { outline: none; }
  #frag-editor, #frag-editor div { line-height: 1.6 !important; }
  .line-numbers {
    position: absolute;
    left: 0; top: 0;
    padding: 12px 8px;
    color: #2a2a2a;
    text-align: right;
    user-select: none;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
  }
  #editor-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  #error-bar {
    height: 24px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    font-size: 10px;
    letter-spacing: 1px;
    color: #ff4444;
    background: #0a0000;
    border-top: 1px solid #200;
    display: none;
  }
  #error-bar.show { display: flex; }
  #presets-bar {
    padding: 8px 14px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    border-bottom: 1px solid #141414;
    background: #070707;
  }
  .preset-chip {
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid #1e1e1e;
    font-size: 9px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    color: #444;
  }
  .preset-chip:hover { border-color: #00ff87; color: #00ff87; }
  .preset-chip.active { border-color: #00ff87; color: #00ff87; background: rgba(0,255,135,0.05); }
  #canvas-wrap {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
  }
  #glCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  #perf {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 10px;
    letter-spacing: 1px;
    color: rgba(0,255,135,0.4);
    pointer-events: none;
  }
  #info {
    position: absolute;
    bottom: 12px;
    right: 12px;
    font-size: 10px;
    color: #222;
    letter-spacing: 1px;
    text-align: right;
    pointer-events: none;
  }
  #click-hint {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  #click-hint.hidden { opacity: 0; }
  #share-url {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #0a0a0a;
    border: 1px solid #00ff87;
    padding: 20px 28px;
    border-radius: 8px;
    z-index: 99;
    display: none;
    flex-direction: column;
    gap: 12px;
    max-width: 500px;
    width: 90%;
  }
  #share-url input {
    background: #0f0f0f;
    border: 1px solid #1a1a1a;
    color: #00ff87;
    padding: 10px 14px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    width: 100%;
    outline: none;
  }
  #share-url .share-title { font-size: 11px; letter-spacing: 3px; color: #555; text-transform: uppercase; }
  #share-url .close-btn { background: transparent; border: 1px solid #1e1e1e; color: #444; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 10px; letter-spacing: 2px; align-self: flex-end; }
  #compile-btn { background: rgba(0,255,135,0.1) !important; border-color: #00ff87 !important; color: #00ff87 !important; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="toolbar">
    <h1>MORPHIX</h1>
    <div class="toolbar-btns">
      <button class="tbtn" id="compile-btn" onclick="morph.compile()">▶ RUN</button>
      <button class="tbtn" onclick="morph.resetTime()">↺ TIME</button>
      <button class="tbtn" onclick="morph.share()">⎘ SHARE</button>
    </div>
  </div>
  <div id="presets-bar"></div>
  <div id="editor-wrap">
    <div id="frag-editor" contenteditable="true" spellcheck="false"></div>
  </div>
  <div id="error-bar"></div>
</div>

<div id="canvas-wrap">
  <canvas id="glCanvas"></canvas>
  <div id="perf"></div>
  <div id="info">MORPHIX GLSL playground · drag to orbit</div>
  <div id="click-hint">click canvas to interact with shader</div>
</div>

<div id="share-url">
  <div class="share-title">Share Link</div>
  <input type="text" readonly id="share-url-input">
  <button class="close-btn" onclick="document.getElementById('share-url').style.display='none'">CLOSE</button>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// VERTEX SHADER (passthrough)
// ─────────────────────────────────────────────────────────────────────────────
const VS = `
attribute vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
`;

// ─────────────────────────────────────────────────────────────────────────────
// MORPHIX — Live GLSL Playground
// ─────────────────────────────────────────────────────────────────────────────

const PRESETS = {

  "WAVE SIN": `// Wave Sin — neon ripple across distance field
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = (FC.xy - 0.5 * iResolution.xy) / iResolution.y;
    float t = iTime * 0.8;
    float d = length(uv);
    float wave = sin(d * 20.0 - t * 4.0) * 0.5 + 0.5;
    float pulse = sin(d * 8.0 - t * 2.0) * 0.5 + 0.5;
    vec3 col = mix(vec3(0.0, 0.05, 0.1), vec3(0.0, 1.0, 0.7), wave);
    col = mix(col, vec3(1.0, 0.2, 0.5), pulse * (1.0 - wave));
    col *= 1.5 / (d * 2.0 + 0.3);
    O = vec4(col, 1.0);
}`,

  "Mandelbrot": `// Mandelbrot — click to zoom
#define ITERS 80
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = (FC.xy - 0.5*iResolution.xy) / iResolution.y;
    vec2 c = uv * 2.8 - vec2(0.5, 0.0);
    if (iMouse.z > 0.0) {
        vec2 m = (iMouse.xy - 0.5*iResolution.xy) / iResolution.y;
        c = m * 2.8 + (c - m * 2.8) * 0.3;
    }
    vec2 z = vec2(0.0);
    float i = 0.0;
    for (; i < float(ITERS) && dot(z,z) < 4.0; i++) z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;
    float sn = i - log2(log2(dot(z,z)));
    vec3 c0 = 0.5 + 0.5*cos(6.2831*sn/20.0 + vec3(0,1,2)*0.7);
    O = vec4(i >= float(ITERS) ? vec3(0.0) : c0 * c0, 1.0);
}`,

  "Plasma": `// Plasma — classic sine-sum plasma
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = FC.xy / iResolution.xy;
    float t = iTime * 0.4;
    float v = 0.0;
    v += sin(uv.x*10.0 + t);
    v += sin(uv.y*10.0 + t * 1.4);
    v += sin(uv.x*10.0 + uv.y*10.0 + t * 0.9);
    float cx = uv.x + 0.5*sin(t*0.6) + 0.3*sin(t*0.4);
    float cy = uv.y + 0.5*sin(t*0.5) + 0.2*sin(t*0.7);
    v += sin(sqrt(100.0*(cx*cx + cy*cy)) + t * 1.2);
    v /= 5.0;
    vec3 col; col.r = sin(v*6.28*1.0)*0.5+0.5;
    col.g = sin(v*6.28*1.5+1.0)*0.5+0.5;
    col.b = sin(v*6.28*1.8+2.0)*0.5+0.5;
    O = vec4(col, 1.0);
}`,

  "Raymarcher": `// Raymarcher — infinite fractal mountains
#define MAX_STEPS 80
#define MAX_D 20.0
#define SURF 0.001
float map(vec3 p) {
    float h = 0.0; float f = 1.0;
    for (int i = 0; i < 5; i++) {
        h += sin(p.x*f)*sin(p.z*f) * 0.4 / f;
        f *= 2.1;
    }
    return p.y + 1.5 - h;
}
vec3 norm(vec3 p) {
    vec2 e = vec2(0.01, 0.0);
    return normalize(vec3(map(p+e.xyy)-map(p-e.xyy), map(p+e.yxy)-map(p-e.yxy), map(p+e.yyx)-map(p-e.yyx)));
}
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = (FC - 0.5*iResolution.xy)/iResolution.y;
    vec3 rd = normalize(vec3(uv, 1.0));
    vec3 ro = vec3(0.0, 2.5, iTime*0.4);
    float d = 0.0; float hit = 0.0;
    for (int i = 0; i < MAX_STEPS; i++) {
        vec3 p = ro + rd*d;
        float dm = map(p);
        if (dm < SURF) { hit = 1.0; break; }
        d += dm * 0.7;
        if (d > MAX_D) break;
    }
    vec3 col = vec3(0.0);
    if (hit > 0.0) {
        vec3 p = ro + rd*d;
        vec3 n = norm(p);
        float diff = max(0.0, dot(n, normalize(vec3(0.6,0.8,0.4))));
        float sky = dot(n, vec3(0.0,1.0,0.0))*0.5+0.5;
        col = mix(vec3(0.05,0.08,0.15), vec3(0.4,0.6,0.9), diff);
        col += vec3(0.1,0.2,0.3)*sky*0.3;
        col = pow(col, vec3(0.85));
    } else {
        float sun = max(0.0, dot(rd, normalize(vec3(0.4,0.8,0.2))));
        col = mix(vec3(0.01,0.02,0.05), vec3(0.05,0.1,0.2), rd.y*0.5+0.5);
        col += vec3(1.0,0.8,0.4)*pow(sun, 16.0)*0.5;
    }
    O = vec4(col, 1.0);
}`,

  "Voronoi": `// Voronoi — cellular noise
vec2 hash22(vec2 p) {
    p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
    return fract(sin(p)*43758.5453);
}
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = FC.xy / iResolution.y;
    float t = iTime * 0.2;
    vec2 g = floor(uv*8.0);
    vec2 f = fract(uv*8.0);
    float d1 = 8.0, d2 = 8.0;
    for (int y = -1; y <= 1; y++) {
        for (int x = -1; x <= 1; x++) {
            vec2 off = vec2(x,y);
            vec2 p = hash22(g+off);
            vec2 anim = vec2(sin(p.x*t)*0.5, cos(p.y*t)*0.5);
            vec2 r = p + off + anim*0.5 - f;
            float d = dot(r,r);
            if (d < d1) { d2 = d1; d1 = d; } else if (d < d2) { d2 = d; }
        }
    }
    float edge = sqrt(d2) - sqrt(d1);
    vec3 col = 0.5 + 0.5*cos(vec3(0.0,2.0,4.0) + sqrt(d1)*8.0 + t*2.0);
    col = mix(col, vec3(0.05,0.05,0.05), smoothstep(0.0,0.06,edge));
    col *= 1.5/(sqrt(d1)*0.8+0.2);
    O = vec4(col, 1.0);
}`,

  "Galaxy": `// Galaxy — spiral arms
#define PI 3.14159
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = (FC - 0.5*iResolution.xy) / iResolution.y;
    float t = iTime * 0.15;
    float r = length(uv) * 3.0;
    float a = atan(uv.y, uv.x);
    float arms = 3.0;
    float spiral = sin(a * arms - r * 3.0 + t * 2.0) * 0.5 + 0.5;
    float core = exp(-r * 2.5);
    float stars = fract(sin(dot(FC, vec2(12.9898,78.233)))*43758.5453);
    stars = step(0.998, stars) * 0.5;
    vec3 col = vec3(0.02,0.01,0.06);
    col += vec3(0.4,0.2,0.8)*spiral*core*4.0;
    col += vec3(0.1,0.4,1.0)*spiral*core*1.5*(1.0-r*0.5);
    col += vec3(1.0,0.9,0.8)*stars;
    col += vec3(1.0,0.6,0.2)*core*3.0;
    O = vec4(col/(col+0.5), 1.0) * 1.3;
}`,

  "Reaction Diff": `// Reaction-Diffusion — Gray-Scott
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = FC / iResolution.xy;
    float t = iTime * 0.3;
    vec2 seed = floor(uv * 200.0) / 200.0;
    float n = fract(sin(dot(seed, vec2(127.1,311.7)))*43758.5453);
    float f0 = 0.5 + sin(t * 0.7 + n * 6.28) * 0.4;
    float k = 0.055 + cos(t * 0.3 + n * 3.14) * 0.02;
    float react = sin(uv.x*20.0 + t*0.8 + n*6.28) * sin(uv.y*18.0 + t*0.6) * cos(t*0.2+n*3.0);
    float val = react * (1.0 - react) * f0 * (1.0 - k);
    vec3 col; col.r = react*0.5+0.5; col.g = val*20.0; col.b = 1.0-react;
    O = vec4(col, 1.0);
}`,

  "WARP LENS": `// Warp Lens — chromatic aberration tunnel
void mainImage(out vec4 O, in vec2 FC) {
    vec2 uv = (FC - 0.5*iResolution.xy) / iResolution.y;
    float t = iTime * 0.5;
    float r = length(uv);
    float a = atan(uv.y, uv.x);
    vec2 uv2 = uv * (1.0 + sin(r*10.0 - t*3.0)*0.05);
    float distort = sin(r*12.0 + t*2.0)*0.5+0.5;
    vec3 col;
    for (int i = 0; i < 3; i++) {
        float ang = a + float(i)*0.02;
        float rd = r*(1.0 + float(i)*0.005*distort);
        float v = sin(rd*25.0 - t*4.0 + float(i)*2.0 + sin(ang*6.0+t)*0.5)*0.5+0.5;
        col[int(i)] = v;
    }
    col = mix(vec3(0.0,0.02,0.08), col*0.5+0.3, 1.0/(r*2.0+0.3));
    O = vec4(col, 1.0);
}`,
};

const FS_HEADER = `
precision highp float;
uniform vec2 iResolution;
uniform float iTime;
uniform vec4 iMouse;
uniform float iTimeDelta;
uniform int iFrame;
uniform float iFrameRate;
uniform float iSampleRate;
uniform vec4 iDate;
uniform float iChannelTime[4];
uniform vec3 iChannelResolution[4];
uniform sampler2D iChannel0;
uniform sampler2D iChannel1;
uniform sampler2D iChannel2;
uniform sampler2D iChannel3;
#define mainImage(O,FC) \\
`;

const FS_WRAPPER = (code) => `
${code}

void main() {
    vec4 _outColor;
    mainImage(_outColor, gl_FragCoord.xy);
    gl_FragColor = _outColor;
}
`;

class Morphix {
  constructor() {
    this.canvas = document.getElementById('glCanvas');
    this.gl = this.canvas.getContext('webgl') || this.canvas.getContext('experimental-webgl');
    if (!this.gl) { alert('WebGL not supported'); return; }

    this.program = null;
    this.time = 0;
    this.frame = 0;
    this.lastTime = performance.now();
    this.mouse = [0, 0, 0, 0];
    this.mouseDown = false;
    this.errorMsg = '';
    this.currentPreset = 'WAVE SIN';

    this.buildQuad();
    this.resize();
    window.addEventListener('resize', () => this.resize());

    this.buildPresets();
    this.setPreset(this.currentPreset);

    this.canvas.addEventListener('mousedown', e => this.onMouse(e, true));
    this.canvas.addEventListener('mouseup', e => this.onMouse(e, false));
    this.canvas.addEventListener('mousemove', e => this.onMouseMove(e));
    this.canvas.addEventListener('click', () => document.getElementById('click-hint').classList.add('hidden'));

    this.initEditor();
    this.compile();
    this.loop();
  }

  buildQuad() {
    const gl = this.gl;
    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  }

  resize() {
    const wrap = document.getElementById('canvas-wrap');
    const dpr = Math.min(window.devicePixelRatio, 2);
    this.canvas.width = wrap.clientWidth * dpr;
    this.canvas.height = wrap.clientHeight * dpr;
    this.gl.viewport(0, 0, this.canvas.width, this.canvas.height);
  }

  compile() {
    const gl = this.gl;
    const fragCode = this.getFragCode();

    // Compile vertex shader
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VS);
    gl.compileShader(vs);
    if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) {
      this.showError('VS: ' + gl.getShaderInfoLog(vs));
      return;
    }

    // Compile fragment shader
    const fs = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(fs, fragCode);
    gl.compileShader(fs);
    if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
      const log = gl.getShaderInfoLog(fs);
      this.showError(log);
      return;
    }

    // Link program
    const prog = gl.createProgram();
    gl.attachShader(prog, vs);
    gl.attachShader(prog, fs);
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      this.showError('Link: ' + gl.getProgramInfoLog(prog));
      return;
    }

    this.program = prog;
    gl.useProgram(prog);

    // Bind quad
    const loc = gl.getAttribLocation(prog, 'aPos');
    gl.enableVertexAttribArray(loc);
    gl.bindBuffer(gl.ARRAY_BUFFER, gl.getBuffer(gl.ARRAY_BUFFER));
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

    this.hideError();
    document.getElementById('compile-btn').classList.add('run');
  }

  getFragCode() {
    const rawCode = this.editorEl.textContent;
    return FS_HEADER + rawCode + FS_WRAPPER(rawCode);
  }

  showError(msg) {
    this.errorMsg = msg;
    const bar = document.getElementById('error-bar');
    bar.textContent = msg.length > 120 ? msg.substring(0, 120) + '...' : msg;
    bar.classList.add('show');
    document.getElementById('compile-btn').classList.remove('run');
  }

  hideError() { document.getElementById('error-bar').classList.remove('show'); }

  resetTime() { this.time = 0; }

  buildPresets() {
    const bar = document.getElementById('presets-bar');
    for (const name of Object.keys(PRESETS)) {
      const chip = document.createElement('div');
      chip.className = 'preset-chip' + (name === this.currentPreset ? ' active' : '');
      chip.textContent = name;
      chip.onclick = () => this.setPreset(name);
      bar.appendChild(chip);
    }
  }

  setPreset(name) {
    this.currentPreset = name;
    document.querySelectorAll('.preset-chip').forEach(c => {
      c.classList.toggle('active', c.textContent === name);
    });
    this.editorEl.textContent = PRESETS[name];
    this.formatEditor();
    if (this.program) this.compile();
  }

  initEditor() {
    this.editorEl = document.getElementById('frag-editor');
    this.editorEl.addEventListener('keydown', e => {
      if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertText', false, '  '); }
    });
    // Ctrl/Cmd+Enter to compile
    this.editorEl.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); this.compile(); }
    });
    this.formatEditor();
  }

  formatEditor() {
    const el = this.editorEl;
    const lines = el.textContent.split('\n');
    el.textContent = lines.join('\n');
    // Position cursor at end
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  onMouse(e, down) {
    const r = this.canvas.getBoundingClientRect();
    this.mouse[0] = (e.clientX - r.left) * (this.canvas.width / r.width);
    this.mouse[1] = (r.bottom - e.clientY) * (this.canvas.height / r.height);
    this.mouse[2] = down ? this.mouse[0] : 0;
    this.mouse[3] = down ? this.mouse[1] : 0;
    this.mouseDown = down;
  }

  onMouseMove(e) {
    if (!this.mouseDown) return;
    const r = this.canvas.getBoundingClientRect();
    this.mouse[0] = (e.clientX - r.left) * (this.canvas.width / r.width);
    this.mouse[1] = (r.bottom - e.clientY) * (this.canvas.height / r.height);
  }

  share() {
    const code = btoa(this.editorEl.textContent);
    const url = `${location.origin}${location.pathname}?code=${encodeURIComponent(code)}`;
    const input = document.getElementById('share-url-input');
    input.value = url;
    document.getElementById('share-url').style.display = 'flex';
    input.select();
  }

  loop() {
    const gl = this.gl;
    const now = performance.now();
    const dt = (now - this.lastTime) / 1000;
    this.lastTime = now;
    this.time += dt;
    this.frame++;

    if (!this.program) { requestAnimationFrame(() => this.loop()); return; }

    gl.useProgram(this.program);

    const res = gl.getUniformLocation(this.program, 'iResolution');
    const tim = gl.getUniformLocation(this.program, 'iTime');
    const mou = gl.getUniformLocation(this.program, 'iMouse');
    const td = gl.getUniformLocation(this.program, 'iTimeDelta');
    const fr = gl.getUniformLocation(this.program, 'iFrame');
    const frm = gl.getUniformLocation(this.program, 'iFrameRate');
    const dat = gl.getUniformLocation(this.program, 'iDate');
    const smp = gl.getUniformLocation(this.program, 'iSampleRate');

    gl.uniform2f(res, this.canvas.width, this.canvas.height);
    gl.uniform1f(tim, this.time);
    gl.uniform4f(mou, this.mouse[0], this.mouse[1], this.mouse[2], this.mouse[3]);
    gl.uniform1f(td, dt);
    gl.uniform1i(fr, this.frame);
    gl.uniform1f(frm, 1 / dt);
    const d = new Date();
    const sec = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds() + d.getMilliseconds()*0.001;
    gl.uniform4f(dat, d.getFullYear(), d.getMonth()+1, d.getDate(), sec);
    gl.uniform1f(smp, 44100.0);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // FPS
    if (this.frame % 30 === 0) {
      document.getElementById('perf').textContent = `${Math.round(1/dt)} FPS · ${this.currentPreset}`;
    }

    requestAnimationFrame(() => this.loop());
  }
}

// Handle shared link
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(location.search);
  if (params.has('code')) {
    try {
      const code = decodeURIComponent(params.get('code'));
      // Load after init
      setTimeout(() => {
        document.getElementById('frag-editor').textContent = atob(code);
      }, 100);
    } catch(e) {}
  }
  window.morph = new Morphix();
});
</script>
